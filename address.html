<h1>bell.hot-singles.link</h1>

<noscript>Javascript is required to copy text automatically</noscript>
<button id="copyIp">Copy to clipboard</button>
<script>
    copyIpButton = document.getElementById("copyIp");
    copyIpListener = copyIpButton.addEventListener("click",copyIp);
    function copyIp() {
        navigator.clipboard.writeText("bell.hot-singles.link:25565");
        copyIpButton.innerHTML = "Copied!";
    }
</script>
